<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodur Hub</title>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/authentication.css">
    <link rel="stylesheet" href="../css/payments-page.css">
    <link rel="stylesheet" href="../css/food-payments-page.css">
    <link rel="stylesheet" href="../css/location.css">
    <link rel="stylesheet" href="../css/teal-theme.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <style>

        .payment-and-delivery-details{
            display: grid;
            /* grid-template-rows: 1fr 1fr; */
            grid-template-rows: auto auto;
            gap: 30px;
        }

        .order-title{
            align-self: center;
            justify-items: center;
        }

        .delivery-details{
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #ebebeb;
            flex:1;
            /* height: 200px; */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .order-summary{
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .payment-form{
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .summary-row{
            padding: 12px 0;
        }

        .summary-row.order-title {
            border-bottom: 2px solid #e2e8f0;
            margin-top: 15px;
            padding-bottom: 6px;

            color: #1e293b; 
            font-size: 15px;
            text-transform: none; 
            letter-spacing: normal;
            font-weight: 700;
        }

        .summary-row .detail-label {
            color: #334155;
            font-size: 14px;
            font-weight: 500;
        }

        .summary-row .detail-value {
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
        }

        .order-summary .summary-row:last-child{
            border-bottom: none; 
            margin-top: 12px;
            padding-top: 16px;
            border-top: 2px dashed #cbd5e1; 
        }

        .order-summary .summary-row:last-child .label {
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            text-transform: none;
        }

        .order-summary .summary-row:last-child .value {
            color: #0b8e96; /* Matches your core accent brand teal color */
            font-size: 18px;
            font-weight: 700;
        }

        .summary-row label{
            color: #64748b; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .summary-row .value {
            color: #0f172a; 
            font-size: 15px;
            font-weight: 500;
            text-align: right;
        }

        .summary-row .address-value {
            max-width: 60%;
            line-height: 1.4;
            word-break: break-all;     
        }

        .items-total{
            margin-top: 20px;
            padding-bottom: 10px;
        }

        .delivery-charges{
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .item-meta{
            display: flex;
            gap: 20px;
        }

        .item-qty{
            background: #c7e9b4;
            color: #1F7446;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            flex-shrink: 0;
        }

    </style>
</head>
<body>
    <div class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close js-close-form">&times;</button>

            <div class="modal-tabs">
                <button id="js-signin-tab" class="tab-btn js-signin-links active">Sign in</button>
                <button id="js-signup-tab" class="tab-btn js-signup-links">Sign up</button>
            </div>

            <div class="tab-content signin-form js-signin-form active" id="signin-form">
                <h2>Welcome back</h2>
                <p>sign in to your KodurHub account</p>

                <div class="input-group">
                    <label for="user-phone-number">Phone number</label>
                    <input type="tel"  id="user-phone-number">
                </div>

                <div class="input-group">
                    <label for="user-password">Password</label>
                    <input type="password"  id="user-password">
                </div>

                <button class="submit-btn" data-tab="signin">Sign in</button>

                <p class="switch-text js-signup-links">Don't have an account? Sign up</p>
            </div>

            <div class="tab-content signup-form js-signup-form" id="signup-form">
                <h2>Create account</h2>
                <p>Join KodurHub today</p>
                <div class="input-group">
                    <label for="signup-full-name">Full name</label>
                    <input type="text" id="signup-full-name">
                </div>

                <div class="input-group">
                    <label for="signup-phone-number">Phone number</label>
                    <input type="tel" id="signup-phone-number">
                </div>
                    
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password">
                </div>
                <button class="submit-btn" data-tab="signup">Create account</button>
                <p class="switch-text js-signin-links">Already have an account? Sign in</p>
            </div>
            
        </div>
    </div>


    <nav>
        <div class="navbar">

            <div class="navbar-left">
                <a href="../index.html" style="text-decoration: none; color: inherit;">
                    <div class="logo">
                        <span id="kodur">Kodur</span>
                        <span id="hub">Hub</span>
                    </div>
                </a>
                

                <div class="location-wrapper">
                    <div class="location js-location-btn">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Deliver to</span>
                        <span class="location-city">Kodur</span>
                    </div>
                    <div class="location-dropdown js-location-dropdown">
                        <p class="dropdown-label">YOUR LOCATION</p>
                        <div class="location-option active-location">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>kodur</span>
                        </div>
                    </div>
                </div>
                
            </div>

            <div class="navbar-right">
                <span id="signin-btn" class="js-signin-btn">Sign in</span>
                <!-- <div class="profile">RK</div>
                <span class="username">Ravi Kumar</span> -->
            </div>
    
        </div>
    </nav>

    <div class="payment-wrapper">
        <div class="order-summary js-order-summary">
            
        </div>


        <div class="payment-and-delivery-details">

            <div class="payment-form">
                <h2>Payment</h2>
                <div class="payment-methods">

                    <button class="payment-tab active js-payment-tab" data-method="upi">UPI</button>

                    <button class="payment-tab js-payment-tab" data-method="card">Card</button>

                    <button class="payment-tab js-payment-tab" data-method="netbanking">Netbanking</button>
                </div>

                <div class="upi-section js-payment-method active">
                    <label>UPI ID</label>
                    <input type="text" placeholder="yourname@upi">
                </div>

                <div class="card-section js-payment-method">
                    <input type="text" placeholder="card number">
                    <div class="row">
                        <input type="text" placeholder="Expiry MM/YY">
                        <input type="text" placeholder="CVV">
                    </div>

                    <input type="text" placeholder="Name on card">
                </div>

                <div class="netbanking-section js-payment-method">
                    <label>Select your bank</label>
                    <select>
                        <option>State Bank of India</option>
                        <option>HDFC Bank</option>
                        <option>ICICI Bank</option>
                        <option>Axis Bank</option>
                        <option>Kotak Mahindra Bank</option>
                    </select>
                </div>

                <button class="pay-btn"></button>
                <p class="secure-text"><i class="fa-solid fa-shield-halved"></i> 100% secure & encrypted</p>
            </div>

            <div class="delivery-details"></div>
        </div>  
    </div>

    <script src="../js/food-payment.js" type="module"></script>
    <script src="../js/home.js"></script>
    <script src="../js/location.js"></script>
</body>
</html>
