<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodur Hub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../css/authentication.css">

    <link rel="stylesheet" href="../css/navbar.css">

    <link rel="stylesheet" href="../css/location.css">
    
    <link rel="stylesheet" href="../css/footer.css">

    <link rel="stylesheet" href="../css/teal-theme.css">

    <style>

        body{
            margin: 0;
            font-family: 'Inter',sans-serif;
            background: #f0fafa;
        }

        .location{
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
            color: #ffffff;
        }

        .location-city {
            color: #ffffff;
        }

        .order-header{
            background: #ffffff;
            padding: 20px 28px;
            border-bottom: 1px solid #e0f2f1;
        }

        .order-header h1{
            font-size: 22px;
            font-weight: 500;
            color: #111;
            margin: 0 0 4px 0;
        }

        .order-header p{
            font-size: 13px;
            color: #0d7377;
            margin: 0;
        }

        .food-summary-wrapper{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 28px;
            max-width: 900px;
            margin: 0 auto;
            align-items:start; 
        }

        .food-order-card{
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e0f2f1;
        }

        .restaurant-info-row{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .restaurant-name-text{
            font-size: 16px;
            font-weight: 500;
            color: #111;
        }

        .delivery-time-badge{
            background: #e0f2f1;
            color: #0d7377;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .order-items-list{
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .order-item-row{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 14px;
        }

        .item-meta{
            display: flex;
            gap: 20px;
        }

        .item-qty{
            background: #c7e9b4;
            color: #1F7446;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            flex-shrink: 0;
        }

        .item-name-text {
            flex: 1;
            color: #333;
        }

        .item-subtotal {
            font-weight: 500;
            color: #111;
            flex-shrink: 0;
        }

        .order-divider {
            border: none;
            border-top: 1px dashed #e0e0e0;
            margin: 16px 0;
        }

        .order-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .order-delivery-charge-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .grand-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 600;
            color: #111;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
            margin-top: 8px;
        }

        .delivery-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e0f2f1;
        }

        .delivery-card h3 {
            font-size: 16px;
            font-weight: 500;
            color: #111;
            margin: 0 0 20px 0;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-sizing: border-box;
            color: #111;
            resize: none;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #0d7377;
        }

        .place-order-btn {
            width: 100%;
            padding: 14px;
            background: #0d7377;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s ease;
        }

        .place-order-btn:hover {
            background: #0a5c60;
        }


    </style>
</head>
<body>

    <div class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close js-close-form">&times;</button>

            <div class="modal-tabs">
                <button id="js-signin-tab" class="tab-btn js-signin-links active">Sign in</button>
                <button id="js-signup-tab" class="tab-btn js-signup-links">Sign up</button>
            </div>

            <div class="tab-content signin-form js-signin-form active" id="signin-form">
                <h2>Welcome back</h2>
                <p>sign in to your KodurHub account</p>

                <div class="input-group">
                    <label for="user-phone-number">Phone number</label>
                    <input type="tel"  id="user-phone-number">
                </div>

                <div class="input-group">
                    <label for="user-password">Password</label>
                    <input type="password"  id="user-password">
                </div>

                <button class="submit-btn" data-tab="signin">Sign in</button>

                <p class="switch-text js-signup-links">Don't have an account? Sign up</p>
            </div>

            <div class="tab-content signup-form js-signup-form" id="signup-form">
                <h2>Create account</h2>
                <p>Join KodurHub today</p>
                <div class="input-group">
                    <label for="signup-full-name">Full name</label>
                    <input type="text" id="signup-full-name">
                </div>

                <div class="input-group">
                    <label for="signup-phone-number">Phone number</label>
                    <input type="tel" id="signup-phone-number">
                </div>
                    
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password">
                </div>
                <button class="submit-btn" data-tab="signup">Create account</button>
                <p class="switch-text js-signin-links">Already have an account? Sign in</p>
            </div>
            
        </div>
    </div>


    <nav>
        <div class="navbar">

            <div class="navbar-left">
                <a href="../index.html" style="text-decoration: none; color: inherit;">
                    <div class="logo">
                        <span id="kodur">Kodur</span>
                        <span id="hub">Hub</span>
                    </div>
                </a>
                

                <div class="location-wrapper">
                    <div class="location js-location-btn">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Deliver to</span>
                        <span class="location-city">Kodur</span>
                    </div>
                    <div class="location-dropdown js-location-dropdown">
                        <p class="dropdown-label">YOUR LOCATION</p>
                        <div class="location-option active-location">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>kodur</span>
                        </div>
                    </div>
                </div>
                
            </div>

            <div class="navbar-right">
                <span id="signin-btn" class="js-signin-btn">Sign in</span>
                <!-- <div class="profile">RK</div>
                <span class="username">Ravi Kumar</span> -->
            </div>
    
        </div>
    </nav>


    <div class="order-header">
        <h1>Review Your Order</h1>
        <p>Delivering to Kodur</p>
    </div>
    

    <div class="food-summary-wrapper">

        <div class="food-order-card">
            <div class="restaurant-info-row">

            </div>

            <div class="order-items-list">

            </div>

            <div class="order-divider"></div>

            <div class="order-total-row"></div>
            <div class="order-delivery-charge-row"></div>
            <div class="grand-total-row"></div>
        </div>

        <div class="delivery-card">
            <h3>Delivery Details</h3>
            <div class="input-group">
                <label>Full name</label>
                <input type="text" id="delivery-name" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Phone number</label>
                <input type="tel" id="delivery-phone" placeholder="10-digit number">
            </div>

            <div class="input-group">                
                <label>Delivery address</label>
                <textarea id="delivery-address" rows="3" placeholder="House no, street, area..."></textarea>
            </div>

            <div class="input-group">
                <label>Landmark (optional)</label>
                <input type="text" id="delivery-landmark" placeholder="Near temple, school etc.">
            </div>

            <button class="place-order-btn">Place Order</button>
        </div>
        

    </div>


    <script src="../js/food-order-summary.js" type="module"></script>
    <script src="../js/home.js"></script>
    <script src="../js/location.js"></script>
    
</body>
</html>
