<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodur Hub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../css/authentication.css">

    <link rel="stylesheet" href="../css/navbar.css">

    <link rel="stylesheet" href="../css/location.css">
    
    <link rel="stylesheet" href="../css/footer.css">

    <link rel="stylesheet" href="../css/teal-theme.css">

    <style>

        .location{
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
            color: #ffffff;
        }

        .location-city {
            color: #ffffff;
        }

        body{
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .restaurant-header {
            background: #ffffff;
            border-bottom: 1px solid #e0f2f1;
        }

        .restaurant-cover-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }

        .restaurant-header-info {
            padding: 20px 28px;
        }

        .restaurant-header-info h1 {
            font-size: 24px;
            font-weight: 500;
            color: #111;
            margin: 0 0 4px 0;
        }

        .restaurant-cuisine {
            font-size: 14px;
            color: #999;
            margin: 0 0 12px 0;
        }

        .restaurant-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }

        .restaurant-meta .rating {
            background: #e0f2f1;
            color: #0d7377;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }

        .min-order {
            font-size: 13px;
            color: #aaa;
            margin:8px 0 0 0;
        }

        .menu-wrapper {
            background: #f0fafa;
            padding: 12px 28px 20px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-category-section {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0f2f1;
        }

        .category-title {
            font-size: 16px;
            font-weight: 600;
            color: #0d7377;
            padding: 18px 24px;
            border-bottom: 1px solid #f0fafa;
            margin: 0;
            background: #f8fdfd;
        }

        .menu-items-list {
            display: flex;
            flex-direction: column;
        }

        .menu-item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #f5f5f5;
            gap: 20px;
            transition: background 0.15s ease;
        }

        .menu-item-card:hover {
            background: #fafffe;
        }


        .menu-item-card:last-child {
            border-bottom: none;
        }

        .item-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .veg-indicator {
            font-size: 11px;
            margin-bottom: 4px;
            display: block;
        }

        .item-name {
            font-size: 16px;
            font-weight: 500;
            color: #111;
            margin: 0;
        }

        .item-price {
            font-size: 14px;
            font-weight: 500;
            color: #0d7377;
            margin: 0 0 4px 0;
        }

        .item-description {
            font-size: 12px;
            color: #aaa;
            margin: 0;
        }

        .item-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .item-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }

        .add-btn {
            padding: 8px 28px;
            background: #ffffff;
            color: #0d7377;
            border: 2px solid #0d7377;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.08em;
            width: 120px; 
        }

        .add-btn:hover {
            background: #0d7377;
            color: #ffffff;
        }

        .add-btn.added {
            background: #00a0a5;
            color: #ffffff;
        }

        .add-btn.added:hover {
            background: #0d7377;
            color: #ffffff;
        }



        .cart-bar {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0d7377;    
            color: #ffffff;
            border-radius: 14px;
            padding: 16px 28px;
            min-width: 340px;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(13,115,119,0.4);
            z-index: 100;
        }

        .cart-bar.visible {
            display: flex;
        }

        .cart-count-text {
            font-size: 13px;
            opacity: 0.9;
        }

        .cart-total-text {
            font-size: 16px;
            font-weight: 600;
        }

        .view-cart-btn {
            background: #ffffff;
            color: #0d7377;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }



        .cart-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
        }

        .cart-overlay.visible {
            display: block;
        }

        .cart-panel {
            position: fixed;
            top: 0;
            right: -500px;        
            width: 500px;
            height: 100vh;
            background: #ffffff;
            z-index: 300;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
            box-shadow: -4px 0 24px rgba(0,0,0,0.12);
        }

        .cart-panel.open {
            right: 0px;             
        }

        .cart-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #ebebeb;
        }

        .cart-panel-header h3 {
            font-size: 18px;
            font-weight: 500;
            color: #111;
            margin: 0;
        }

        .close-cart-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #999;
            cursor: pointer;
            padding: 4px;
        }

        .cart-panel-restaurant {
            padding: 12px 24px;
            font-size: 13px;
            color: #0d7377;
            font-weight: 500;
            background: #f0fafa;
            border-bottom: 1px solid #e0f2f1;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 1px dashed #0d7377;
            padding-bottom: 12px;
        }

        .cart-item-row:last-child{
            border-bottom: none;
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 500;
            color: #111;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
           
        }

        .cart-item-image{
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1.5px solid #0d7377;
            border-radius: 6px;
            overflow: hidden;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            background: none;
            border: none;
            font-size: 16px;
            color: #0d7377;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: #f0fafa;
        }

        .qty-count {
            font-size: 14px;
            font-weight: 600;
            color: #0d7377;
            min-width: 20px;
            text-align: center;
        }

        .cart-item-price {
            font-size: 14px;
            font-weight: 500;
            color: #111;
            min-width: 50px;
            text-align: right;
        }

        .cart-panel-footer {
            padding: 20px 24px;
            border-top: 1px solid #ebebeb;
        }

        .cart-footer-total {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 500;
            color: #111;
            margin-bottom: 16px;
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: #0d7377;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .checkout-btn:hover {
            background: #0a5c60;
        }

    </style>
</head>
<body>

    <div class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close js-close-form">&times;</button>

            <div class="modal-tabs">
                <button id="js-signin-tab" class="tab-btn js-signin-links active">Sign in</button>
                <button id="js-signup-tab" class="tab-btn js-signup-links">Sign up</button>
            </div>

            <div class="tab-content signin-form js-signin-form active" id="signin-form">
                <h2>Welcome back</h2>
                <p>sign in to your KodurHub account</p>

                <div class="input-group">
                    <label for="user-phone-number">Phone number</label>
                    <input type="tel"  id="user-phone-number">
                </div>

                <div class="input-group">
                    <label for="user-password">Password</label>
                    <input type="password"  id="user-password">
                </div>

                <button class="submit-btn" data-tab="signin">Sign in</button>

                <p class="switch-text js-signup-links">Don't have an account? Sign up</p>
            </div>

            <div class="tab-content signup-form js-signup-form" id="signup-form">
                <h2>Create account</h2>
                <p>Join KodurHub today</p>
                <div class="input-group">
                    <label for="signup-full-name">Full name</label>
                    <input type="text" id="signup-full-name">
                </div>

                <div class="input-group">
                    <label for="signup-phone-number">Phone number</label>
                    <input type="tel" id="signup-phone-number">
                </div>
                    
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password">
                </div>
                <button class="submit-btn" data-tab="signup">Create account</button>
                <p class="switch-text js-signin-links">Already have an account? Sign in</p>
            </div>
            
        </div>
    </div>


    <nav>
        <div class="navbar">

            <div class="navbar-left">
                <a href="../index.html" style="text-decoration: none; color: inherit;">
                    <div class="logo">
                        <span id="kodur">Kodur</span>
                        <span id="hub">Hub</span>
                    </div>
                </a>
                

                <div class="location-wrapper">
                    <div class="location js-location-btn">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Deliver to</span>
                        <span class="location-city">Kodur</span>
                    </div>
                    <div class="location-dropdown js-location-dropdown">
                        <p class="dropdown-label">YOUR LOCATION</p>
                        <div class="location-option active-location">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>kodur</span>
                        </div>
                    </div>
                </div>
                
            </div>

            <div class="navbar-right">
                <span id="signin-btn" class="js-signin-btn">Sign in</span>
                <!-- <div class="profile">RK</div>
                <span class="username">Ravi Kumar</span> -->
            </div>
    
        </div>
    </nav>


    <div class="restaurant-header"></div>


    <div class="menu-wrapper">

    </div>

    <div class="cart-bar">
        <p class="cart-count"></p>
        <p class="cart-total"></p>
        <button class="view-cart-btn">View Cart</button>
    </div>


    <div class="cart-overlay js-cart-overlay"></div>

    <div class="cart-panel js-cart-panel">
        <div class="cart-panel-header">
            <h3>Your Cart</h3>
            <button class="close-cart-btn js-close-cart">✕</button>
        </div>
        <div class="cart-panel-restaurant">
            <span class="js-cart-restaurant-name"></span>
        </div>
        <div class="cart-items-list js-cart-items-list">
            <!-- JS fills this -->
        </div>
        <div class="cart-panel-footer">
            <div class="cart-footer-total">
                <span>Total</span>
                <span class="js-cart-footer-total">₹0</span>
            </div>
            <button class="checkout-btn js-checkout-btn">Proceed to checkout</button>
        </div>
    </div>


    <script src="../js/menu-page.js" type="module"></script>
    <script src="../js/home.js"></script>
    <script src="../js/location.js"></script>
    
</body>
</html>
